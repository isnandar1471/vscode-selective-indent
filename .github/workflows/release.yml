name: Release and Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      vsix-file: ${{ steps.vsix.outputs.file }}
      changelog-description: ${{ steps.changelog.outputs.description }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get version and name from package.json
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          VSIX_FILE="$NAME-$VERSION.vsix"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "vsix_file=$VSIX_FILE" >> $GITHUB_OUTPUT

      - name: Verify tag matches version
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          PACKAGE_VERSION="v${{ steps.meta.outputs.version }}"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "❌ Error: Git tag ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "✅ Tag version matches package.json"

      - name: Run type check
        run: npm run check-types

      - name: Run linter
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          # Extract changelog content between version markers
          awk "/## \[$VERSION\]/,/## \[/" CHANGELOG.md | head -n -1 | tail -n +2 > changelog_entry.txt
          
          # Check if changelog entry exists
          if [ ! -s changelog_entry.txt ]; then
            echo "⚠️ Warning: No changelog entry found for version $VERSION"
            echo "description=See GitHub release for details." >> $GITHUB_OUTPUT
          else
            # Read and encode for multi-line output
            {
              echo 'description<<EOF'
              cat changelog_entry.txt
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          fi

      - name: Package VS Code Extension
        run: npx vsce package

      - name: Get .vsix filename
        id: vsix
        run: |
          FILE=$(ls *.vsix | head -n 1)
          if [ -z "$FILE" ]; then
            echo "❌ Error: No .vsix file found"
            exit 1
          fi
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "✅ VSIX file generated: $FILE"

      - name: Upload VSIX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: ${{ steps.vsix.outputs.file }}
          retention-days: 5

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          body: ${{ steps.changelog.outputs.description }}
          files: ${{ steps.vsix.outputs.file }}
          fail_on_unmatched_files: true

      - name: Release summary
        run: |
          echo "✅ Release prepared successfully"
          echo "📦 Version: v${{ steps.meta.outputs.version }}"
          echo "📄 File: ${{ steps.vsix.outputs.file }}"

  publish-vscode:
    needs: release
    runs-on: ubuntu-latest
    if: secrets.VSCE_PAT != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Publish to VS Code Marketplace
        run: |
          npx vsce publish --packagePath ${{ needs.release.outputs.vsix-file }} --pat ${{ secrets.VSCE_PAT }}
        continue-on-error: true

      - name: Post success message
        if: success()
        run: |
          echo "✅ Extension v${{ needs.release.outputs.version }} published to VS Code Marketplace."

      - name: Post failure message
        if: failure()
        run: |
          echo "⚠️ Failed to publish to VS Code Marketplace. Please check logs."

  publish-ovsx:
    needs: release
    runs-on: ubuntu-latest
    if: secrets.OVSX_PAT != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package

      - name: Publish to Open VSX
        run: |
          npx ovsx publish ${{ needs.release.outputs.vsix-file }} -p ${{ secrets.OVSX_PAT }}
        continue-on-error: true

      - name: Post success message
        if: success()
        run: |
          echo "✅ Extension v${{ needs.release.outputs.version }} published to Open VSX Registry."

      - name: Post failure message
        if: failure()
        run: |
          echo "⚠️ Failed to publish to Open VSX. Please check logs."
